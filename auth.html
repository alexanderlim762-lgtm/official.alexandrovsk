<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — Архивы ААО</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1e293b;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: #3b82f6;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .switch-auth {
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }

        .switch-auth a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }

        /* Скрываем регистрацию по умолчанию */
        #register-form { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">Архивы ААО</div>
        
        <div id="login-form">
            <h2>Вход в систему</h2>
            <p class="subtitle">Добро пожаловать обратно</p>
            
            <div class="form-group">
                <label>Email или Логин</label>
                <input type="text" placeholder="Введите ваши данные">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" placeholder="••••••••">
            </div>
            
            <button class="btn-primary">Войти</button>
            
            <div class="switch-auth">
                Нет аккаунта? <a href="#" onclick="toggleAuth()">Зарегистрироваться</a>
            </div>
        </div>

        <div id="register-form">
            <h2>Регистрация</h2>
            <p class="subtitle">Создайте аккаунт в Архивах</p>
            
            <div class="form-group">
                <label>Ваше имя (Никнейм)</label>
                <input type="text" placeholder="Напр. Alexander">
            </div>

            <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" placeholder="example@mail.com">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" placeholder="Придумайте пароль">
            </div>
            
            <button class="btn-primary">Создать аккаунт</button>
            
            <div class="switch-auth">
                Уже есть аккаунт? <a href="#" onclick="toggleAuth()">Войти</a>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }
    </script>

</body>
</html>
