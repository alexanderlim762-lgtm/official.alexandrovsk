<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДОСТУП ОГРАНИЧЕН — СИСТЕМА ААО</title>
    
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0000; /* Очень темно-красный оттенок */
            color: #ff3333;
            font-family: 'VCR OSD Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Эффект помех VHS */
        .vhs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_Small.gif');
            opacity: 0.1;
            pointer-events: none;
            z-index: 10;
        }

        /* Красная сканирующая полоса */
        .scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 20px #ff0000;
            animation: scan 3s linear infinite;
            z-index: 5;
        }

        .container {
            text-align: center;
            border: 2px solid #ff3333;
            padding: 40px;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        .error-code {
            font-size: 6rem;
            margin: 0;
            letter-spacing: 10px;
            animation: shake 0.2s infinite alternate;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            margin: 20px 0;
            background: #ff3333;
            color: #000;
            padding: 5px;
        }

        .details {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: left;
            border-left: 3px solid #ff3333;
            padding-left: 15px;
        }

        .ip-box {
            background: #220000;
            padding: 10px;
            font-size: 0.9rem;
            border: 1px dashed #ff3333;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            100% { transform: translateX(2px); }
        }

        .glitch-text {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div class="vhs-overlay"></div>
    <div class="scanner"></div>

    <div class="container">
        <p style="text-align: left; margin: 0; font-size: 12px;">SECURITY PROTOCOL v.4.0.3</p>
        <div class="error-code">403</div>
        <h1 class="glitch-text">ДОСТУП ЗАБЛОКИРОВАН</h1>
        
        <div class="details">
            ПРИЧИНА: ПОДОЗРИТЕЛЬНАЯ АКТИВНОСТЬ<br>
            СТАТУС: IP-АДРЕС ВНЕСЕН В ЧЕРНЫЙ СПИСОК<br>
            ДЕЙСТВИЕ: СОЕДИНЕНИЕ ПРЕРВАНО
        </div>

        <div class="ip-box">
            YOUR IP: <span id="user-ip">192.168.0.1</span><br>
            TIMESTAMP: 2026-03-12 19:15:05
        </div>

        <p style="margin-top: 30px; font-size: 0.8rem;">
            Если вы считаете, что это ошибка, обратитесь в <br>
            <a href="bot.html" style="color: #fff; text-decoration: underline;">ОТДЕЛ АПЕЛЛЯЦИЙ ААО</a>
        </p>
    </div>

    <script>
        // Имитация получения IP (или можно оставить статичный)
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => document.getElementById('user-ip').innerText = data.ip)
            .catch(() => {});
    </script>

</body>
</html>
