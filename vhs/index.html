<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHS Experience</title>
    <style>
        /* ШРИФТ (убедись, что файл vcr_osd.ttf лежит в корне репозитория) */
        @font-face {
            font-family: 'VHS-Font';
            src: url('./vcr_osd.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'VHS-Font', monospace;
            overflow: hidden;
        }

        /* 1. ЭКРАН ВСТАВКИ КАССЕТЫ */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: pointer;
        }

        .insert-btn {
            border: 2px solid #fff;
            padding: 20px 40px;
            font-size: 2rem;
            background: none;
            color: #fff;
            font-family: 'VHS-Font';
            transition: 0.3s;
        }

        .insert-btn:hover {
            background: #fff;
            color: #000;
        }

        /* 2. СИНИЙ ЭКРАН */
        #blue-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0000ff; /* Тот самый синий */
            display: none; /* Скрыт по умолчанию */
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            z-index: 1000;
        }

        .osd-text {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 2px 2px #000;
            filter: blur(0.5px);
        }

        /* 3. ОСНОВНОЙ КОНТЕНТ (Скрыт пока идет синий экран) */
        #main-site {
            opacity: 0;
            transition: opacity 2s;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ЭФФЕКТЫ ПОМЕХ */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGuS4/giphy.gif');
            opacity: 0.05; z-index: 500; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button class="insert-btn" onclick="startVhs()">INSERT CASSETTE</button>
    </div>

    <div id="blue-screen">
        <div class="osd-text">PLAY</div>
        <div style="display: flex; justify-content: space-between;">
            <div class="osd-text">SLP</div>
            <div class="osd-text">0:00:00</div>
        </div>
    </div>

    <div id="main-site">
        <div class="noise"></div>
        <h1 style="font-size: 5rem; text-shadow: 3px 0 red, -3px 0 cyan;">ДОБРО ПОЖАЛОВАТЬ В 1996</h1>
    </div>

    <audio id="vhs-sound" src="https://www.soundjay.com/mechanical/cassette-insert-01.mp3"></audio>

    <script>
        function startVhs() {
            const intro = document.getElementById('intro-screen');
            const blue = document.getElementById('blue-screen');
            const main = document.getElementById('main-site');
            const audio = document.getElementById('vhs-sound');

            // 1. Прячем кнопку, включаем звук
            intro.style.display = 'none';
            audio.play();

            // 2. Показываем синий экран
            blue.style.display = 'flex';

            // 3. Через 4 секунды убираем синий экран и плавно показываем сайт
            setTimeout(() => {
                blue.style.display = 'none';
                main.style.opacity = '1';
            }, 4000);
        }
    </script>

</body>
</html>
