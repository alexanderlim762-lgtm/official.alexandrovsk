<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VHS Retro Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #eee;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        /* Слой с помехами (Noise) */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGuS4/giphy.gif');
            opacity: 0.05;
            z-index: 10;
            pointer-events: none;
        }

        /* Сканирующие линии */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            z-index: 11;
            pointer-events: none;
        }

        /* Контент */
        .container {
            position: relative;
            padding: 40px;
            z-index: 2;
        }

        /* Экранное меню (OSD) */
        .osd {
            position: absolute;
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff;
        }

        .play { top: 30px; left: 40px; }
        .date { bottom: 30px; left: 40px; }
        .timer { bottom: 30px; right: 40px; }

        h1 {
            font-size: 5rem;
            text-align: center;
            margin-top: 15%;
            animation: glitch 1s linear infinite;
        }

        /* Анимация глитча */
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        .screen-tube {
            width: 100vw;
            height: 100vh;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.1) 100%);
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="scanlines"></div>

    <div class="screen-tube">
        <div class="osd play">▶ PLAY</div>
        
        <div class="container">
            <h1>VHS_PROJECT_V1</h1>
            <p style="text-align: center; font-size: 1.5rem;">Вставьте кассету, чтобы продолжить...</p>
        </div>

        <div class="osd date">MAR. 25 1996</div>
        <div class="osd timer">00:12:44</div>
    </div>

</body>
</html>
