<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОШИБКА 404 — АРХИВ ПОТЕРЯН</title>
    
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: #eee;
            font-family: 'VCR OSD Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Эффект шума (Static) */
        .vhs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_Small.gif');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* Глитч контейнер */
        .container {
            text-align: center;
            position: relative;
        }

        /* Основной заголовок с глитчем */
        .glitch {
            font-size: 8rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        .glitch span {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Полоса сбоя VHS */
        .vhs-line {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            position: absolute;
            top: 20%;
            animation: vhs-scan 4s linear infinite;
            filter: blur(1px);
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Ссылка в стиле терминала */
        .back-link {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            border: 2px solid #fff;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }

        /* АНИМАЦИИ */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes vhs-scan {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }

        /* Эффект дрожания экрана */
        .screen-shake {
            animation: shake 10s infinite;
        }

        @keyframes shake {
            0%, 90% { transform: translate(0,0); }
            91% { transform: translate(2px, 1px); }
            92% { transform: translate(-2px, -1px); }
            93% { transform: translate(5px, 0); }
            94% { transform: translate(0,0); }
        }
    </style>
</head>
<body>

    <div class="vhs-overlay"></div>
    <div class="vhs-line"></div>

    <div class="container screen-shake">
        <div class="glitch">
            404
        </div>
        <h2>ОШИБКА: ФАЙЛ ПОВРЕЖДЕН</h2>
        <p>Запрашиваемый документ не найден в Архивах ААО.</p>
        
        <a href="index.html" class="back-link">> ВЕРНУТЬСЯ В ГЛАВНОЕ МЕНЮ</a>
        
        <div style="margin-top: 50px; font-size: 12px; color: #444;">
            PLAY ▶ 00:04:04:00
        </div>
    </div>

</body>
</html>
