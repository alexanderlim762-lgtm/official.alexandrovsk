<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕХНИЧЕСКИЙ ПЕРЕРЫВ — АРХИВЫ ААО</title>
    
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'VCR OSD Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Фоновая настроечная таблица (Color Bars) */
        .color-bars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0.15; /* Едва заметный фон */
            z-index: 1;
        }

        .bar { flex: 1; height: 100%; }
        .bar:nth-child(1) { background: #ffffff; }
        .bar:nth-child(2) { background: #ffff00; }
        .bar:nth-child(3) { background: #00ffff; }
        .bar:nth-child(4) { background: #00ff00; }
        .bar:nth-child(5) { background: #ff00ff; }
        .bar:nth-child(6) { background: #ff0000; }
        .bar:nth-child(7) { background: #0000ff; }

        /* Эффект шума */
        .static-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_Small.gif');
            opacity: 0.08;
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        /* Мигающая надпись */
        .blink {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: blink-anim 1.5s steps(2, start) infinite;
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 20px;
            color: #aaa;
        }

        .timer {
            margin-top: 40px;
            font-size: 1.5rem;
            color: #fff;
        }

        /* Полоса помех */
        .vhs-distort {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.4);
            top: 50%;
            filter: blur(2px);
            animation: move-distort 2s infinite;
        }

        @keyframes blink-anim {
            to { visibility: hidden; }
        }

        @keyframes move-distort {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .vhs-text {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="color-bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
    </div>
    
    <div class="static-noise"></div>
    <div class="vhs-distort"></div>

    <div class="vhs-text">
        SEARCHING...<br>
        SYSTEM: OFFLINE
    </div>

    <div class="content">
        <div class="blink">ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</div>
        <h2>ИДЕТ ОБНОВЛЕНИЕ АРХИВНЫХ ДАННЫХ</h2>
        
        <div class="timer">
            RE-SYNC IN PROGRESS: <span id="clock">00:00:00</span>
        </div>
    </div>

    <script>
        // Простой скрипт для тикающих часов
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
